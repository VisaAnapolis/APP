# ============================================================
# test-email-notify.yml  —  GitHub Actions Workflow
# Envia um e-mail de teste para todos os usuários ativos
# registrados no Firestore, validando conectividade SMTP.
#
# Dispara: apenas manualmente pelo painel do GitHub Actions.
# Análogo ao test-notify.yml (FCM), mas para o canal e-mail.
# ============================================================

name: 📧 Enviar E-mail de Teste

on:
  workflow_dispatch:

jobs:
  test-email-notify:
    name: Enviar E-mail de Teste (SMTP)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '.github/scripts/package-lock.json'

      - name: Instalar dependências
        working-directory: .github/scripts
        run: npm ci

      - name: Criar Service Account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > .github/scripts/service-account.json

      - name: Executar e-mail de teste
        working-directory: .github/scripts
        env:
          SMTP_USER:                     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:                 ${{ secrets.SMTP_PASSWORD }}
          FIREBASE_SERVICE_ACCOUNT_PATH: service-account.json
        run: node test-email-notify.js

      - name: Remover Service Account
        if: always()
        run: rm -f .github/scripts/service-account.json
