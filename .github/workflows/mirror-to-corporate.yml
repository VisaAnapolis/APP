name: Mirror to Corporate GitHub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mirror:
    name: Mirror to VisaAnapolis/APP
    runs-on: ubuntu-latest

    steps:
      - name: Clone bare repository
        run: |
          git clone --bare https://github.com/garrado/VISA.git repo-mirror

      - name: Push mirror to corporate repository
        run: |
          cd repo-mirror
          git push --mirror https://x-access-token:${{ secrets.PAT_CORPORATIVO }}@github.com/VisaAnapolis/APP.git
