# ============================================================
# test-notify.yml  —  GitHub Actions Workflow
# Envia uma notificação de teste para todos os usuários com
# token FCM registrado no Firestore.
#
# Dispara: apenas manualmente pelo painel do GitHub Actions.
# ============================================================

name: Enviar Notificação de Teste

on:
  workflow_dispatch:

jobs:
  test-notify:
    name: Enviar Notificação de Teste FCM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '.github/scripts/package.json'

      - name: Instalar dependências
        working-directory: .github/scripts
        run: npm ci

      - name: Criar Service Account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > .github/scripts/service-account.json

      - name: Executar notificação de teste
        working-directory: .github/scripts
        env:
          FIREBASE_SERVICE_ACCOUNT_PATH: service-account.json
        run: node test-notify.js

      - name: Remover Service Account
        if: always()
        run: rm -f .github/scripts/service-account.json
