<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala de Plantão - VISA Anápolis</title>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>

    <!-- Design System CSS -->
    <link rel="stylesheet" href="./css/design-tokens.css">
    <link rel="stylesheet" href="./css/header-component.css">

    <!-- DataTables CSS e JS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>

    <!-- PapaParse para ler CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

        <style>
        /* RESET */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* Header agora usa header-component.css */


        /* CONTAINER */
        .container {
            max-width: 1400px;
            margin: 22px auto 30px;
            padding: 0 16px;
        }

        /* CARD DE FILTROS */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid var(--line);
            box-shadow: var(--shadow2);
        }

        .card h3 {
            color: var(--brand1);
            font-size: 1.3em;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--brand1);
            padding-bottom: 10px;
        }

        .filter-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .filter-row:last-child {
            margin-bottom: 32px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            min-width: 0;
            justify-content: flex-end;
        }

        .filter-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 0.95em;
        }

        .filter-group select,
        .filter-group input {
            padding: 12px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            font-size: 1em;
            background: var(--input-bg);
            color: var(--input-text);
            box-sizing: border-box;
            width: 100%;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(44, 90, 160, 0.15);
        }

        .btn-search {
            padding: 12px 32px;
            background: linear-gradient(135deg, var(--brand1), var(--brand2));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 700;
            cursor: pointer;
            transition: .15s transform, .15s box-shadow;
            margin-top: 10px;
        }

        .btn-search:hover {
            box-shadow: var(--shadow2);
            transform: translateY(-1px);
        }

        .btn-search:active {
            transform: translateY(0);
        }

        /* ÁREA DE RESULTADOS */
        .results-card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--line);
            box-shadow: var(--shadow2);
            margin-top: 24px;
        }

        .info-box {
            background: rgba(44, 90, 160, 0.08);
            border-left: 4px solid var(--brand1);
            padding: 15px;
            margin-bottom: 16px;
            border-radius: 4px;
            color: var(--text);
        }

        .info-box.warning {
            background: #fff7dd;
            border-left-color: #d1a000;
        }

        .info-box.success {
            background: rgba(52, 199, 89, 0.1);
            border-left-color: #34C759;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin: 32px 0 20px 0;
            flex-wrap: wrap;
            gap: 15px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--brand1), var(--brand2));
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            min-width: 140px;
            box-shadow: var(--shadow2);
        }

        .stat-card h3 {
            font-size: 2.2em;
            margin-bottom: 5px;
            border: none;
            padding: 0;
        }

        .stat-card p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: var(--muted);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ccd6e0;
            border-top: 4px solid var(--brand1);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* DATATABLES */
        table.dataTable {
            width: 100% !important;
            border-collapse: collapse;
            margin-top: 32px !important;
        }

/* Espaçamento dos controles do DataTables */
.dataTables_wrapper .dataTables_length,
.dataTables_wrapper .dataTables_filter {
    margin-bottom: 20px !important;
}

.dataTables_wrapper .dataTables_info,
.dataTables_wrapper .dataTables_paginate {
    margin-top: 20px !important;
}

        
        table.dataTable thead th {
            background: var(--brand1);
            color: white;
            font-weight: 600;
            padding: 12px 8px;
            text-align: left;
            white-space: nowrap;
        }

        table.dataTable tbody td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--line);
            color: var(--text);
        }

        table.dataTable tbody tr:hover {
            background-color: rgba(44, 90, 160, 0.05);
            cursor: pointer;
        }

        /* ===== SCROLL HORIZONTAL COM PRIMEIRA COLUNA FIXA ===== */
        .dataTables_wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table.dataTable {
            border-collapse: separate !important;
            border-spacing: 0;
        }

        /* Primeira coluna fixa */
        table.dataTable thead th:first-child,
        table.dataTable tbody td:first-child {
            position: sticky;
            left: 0;
            z-index: 2;
            background: var(--card);
        }

        table.dataTable thead th:first-child {
            background: var(--brand1);
            z-index: 3;
        }

        /* Sombra sutil para indicar scroll */
        table.dataTable thead th:first-child::after,
        table.dataTable tbody td:first-child::after {
            content: '';
            position: absolute;
            top: 0;
            right: -8px;
            bottom: 0;
            width: 8px;
            background: linear-gradient(to right, rgba(0,0,0,0.08), transparent);
            pointer-events: none;
        }

        /* Garantir que células sticky tenham fundo consistente */
        table.dataTable tbody tr:hover td:first-child {
            background: rgba(44, 90, 160, 0.05);
        }

        /* Fundo cinza para linhas sem plantão */
        table.dataTable tbody tr[style*="background: #f3f3f3"] td:first-child {
            background: #f3f3f3 !important;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            display: inline-block;
        }

        .badge-requerimento { background: #007bff; color: white; }
        .badge-oficio { background: #28a745; color: white; }
        .badge-denuncia { background: #dc3545; color: white; }
        .badge-protocolo { background: #6f42c1; color: white; }

        .badge-complexidade-alta { background: #dc3545; color: white; }
        .badge-complexidade-media { background: #ffc107; color: var(--text-primary); }
        .badge-complexidade-baixa { background: #28a745; color: white; }

        .icon {
            font-size: 1.2em;
        }

        .icon-atendido-sim { color: #28a745; }
        .icon-atendido-nao { color: #ffc107; }
        .icon-cancelado { color: #dc3545; }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--card-bg);
            margin: 50px auto;
            padding: 0;
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
            max-height: 85vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { 
                transform: translateY(-50px);
                opacity: 0;
            }
            to { 
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, var(--brand1), var(--brand2));
            color: white;
            padding: 25px;
            position: relative;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.6em;
            border: none;
        }

        .close {
            position: absolute;
            right: 20px;
            top: 20px;
            color: white;
            font-size: 2em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .close:hover {
            transform: rotate(90deg) scale(1.2);
        }

        .modal-body {
            padding: 25px;
            max-height: calc(85vh - 180px);
            overflow-y: auto;
        }

        .detail-section {
            margin-bottom: 25px;
        }

        .detail-section h3 {
            color: var(--brand1);
            border-bottom: 2px solid var(--brand1);
            padding-bottom: 8px;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .detail-row {
            display: flex;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-label {
            font-weight: 600;
            color: var(--text-secondary);
            width: 200px;
            flex-shrink: 0;
        }

        .detail-value {
            color: var(--text-primary);
            flex: 1;
        }

        .modal-footer {
            background: var(--surface-variant);
            padding: 20px 25px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            border-top: 2px solid #e0e0e0;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--brand1), var(--brand2));
            color: white;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        /* RESPONSIVO */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 768px) {
            .filter-row {
                grid-template-columns: 1fr;
            }

            #tabelaOS {
                min-width: 900px;
            }

            .filter-group select,
            .filter-group input {
                font-size: 16px;
            }

            .filter-group input[type="month"],
.filter-group input[type="date"] {
    max-width: 100%;
    box-sizing: border-box;
}

            .btn-search {
                width: 100%;
                padding: 14px;
            }

            header {
                padding: 28px 70px 26px 20px;
            }

            .detail-row {
                flex-direction: column;
            }

            .detail-label {
                width: 100%;
                margin-bottom: 5px;
            }

            .stats {
                flex-direction: column;
            }
        }

        @media print {
            .card, .btn, .modal-footer {
                display: none !important;
            }
        }


    /* =====================================================
       DARK MODE — overrides DataTables e linhas sem plantão
       ===================================================== */

    /* Linha sem plantão: usa classe CSS (dark mode safe) */
    tr.row-no-plantao td {
      opacity: 0.45;
      font-style: italic;
    }
    table.dataTable tbody tr.row-no-plantao:hover td {
      background: transparent !important;
    }
    table.dataTable tbody tr.row-no-plantao td:first-child {
      background: var(--card) !important;
    }

    /* DataTables: inputs, selects e texto */
    .dataTables_wrapper .dataTables_length label,
    .dataTables_wrapper .dataTables_filter label,
    .dataTables_wrapper .dataTables_info {
      color: var(--text) !important;
    }
    .dataTables_wrapper .dataTables_length select,
    .dataTables_wrapper .dataTables_filter input[type="search"] {
      background-color: var(--input-bg) !important;
      color: var(--input-text) !important;
      border: 1px solid var(--input-border) !important;
      border-radius: 8px !important;
      padding: 7px 10px !important;
      outline: none;
    }
    .dataTables_wrapper .dataTables_filter input[type="search"]:focus {
      border-color: var(--brand1) !important;
      box-shadow: 0 0 0 3px rgba(44,90,160,.15) !important;
    }

    /* Paginação dark-safe */
    .dataTables_wrapper .dataTables_paginate .paginate_button {
      color: var(--text) !important;
      border-radius: 8px !important;
      border: 1px solid transparent !important;
      margin: 0 2px;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button:hover:not(.disabled) {
      background: rgba(44,90,160,.12) !important;
      border-color: var(--line) !important;
      color: var(--text) !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button.current,
    .dataTables_wrapper .dataTables_paginate .paginate_button.current:hover {
      background: linear-gradient(135deg,var(--brand1),var(--brand2)) !important;
      border-color: var(--brand1) !important;
      color: #fff !important;
    }
    .dataTables_wrapper .dataTables_paginate .paginate_button.disabled,
    .dataTables_wrapper .dataTables_paginate .paginate_button.disabled:hover {
      color: var(--muted) !important;
      cursor: not-allowed;
    }

    /* Células da tabela dark-safe */
    table.dataTable tbody td {
      color: var(--text) !important;
      background: var(--card) !important;
    }
    table.dataTable tbody tr:hover td {
      background: rgba(44,90,160,.07) !important;
    }
    table.dataTable tbody tr:hover td:first-child {
      background: rgba(44,90,160,.07) !important;
    }
    /* Linha de fim de semana/feriado: sticky column */
    table.dataTable tbody tr.row-no-plantao td:first-child {
      background: var(--card) !important;
    }

    /* =====================================================
       MOBILE / RESPONSIVO
       ===================================================== */

    /* Esconde tabela DataTables no mobile, mostra cards */
    .mobileOnly  { display: none; }
    .mobileList  { display: none; }
    .desktopOnly { display: block; }

    @media (max-width: 768px) {
      /* Oculta DataTable + controles no mobile */
      .table-container      { display: none !important; }
      .dataTables_wrapper   { display: none !important; }
      .mobileList           { display: block !important; }
      .mobileOnly           { display: block !important; }
      .desktopOnly          { display: none !important; }

      /* Card base */
      .dayCard {
        background: var(--card);
        border: 1px solid var(--line);
        border-left: 4px solid var(--brand1);
        border-radius: 14px;
        padding: 13px 14px;
        margin: 10px 0;
        box-shadow: 0 2px 12px rgba(0,0,0,.07);
        font-family: inherit;
      }
      /* Fim de semana / feriado: mais discreto */
      .dayCard.isWeekend {
        opacity: .42;
        border-left-color: var(--line);
      }
      .dayCard.isWeekend .dayBody { display: none; }

      /* Cabeçalho do card */
      .dayHead {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        padding-bottom: 9px;
        margin-bottom: 9px;
        border-bottom: 1px solid var(--line);
      }
      .dayDate {
        font-size: 1em;
        font-weight: 800;
        color: var(--text);
      }
      .dayDow {
        font-size: .8em;
        font-weight: 700;
        color: var(--brand1);
        background: rgba(44,90,160,.10);
        padding: 2px 9px;
        border-radius: 20px;
        white-space: nowrap;
      }

      /* Corpo do card */
      .dayBody {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .kv {
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }
      .k {
        min-width: 105px;
        font-size: .72em;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: .4px;
        padding-top: 3px;
        white-space: nowrap;
      }
      .v {
        font-size: .92em;
        font-weight: 600;
        color: var(--text);
        line-height: 1.55;
      }

      /* Cores por tipo de turno */
      .kv-mat .k  { color: #c87400; }
      .kv-vesp .k { color: #7b5ea7; }
      .kv-f40 .k  { color: var(--brand1); }

      /* Nota do dia */
      .dayNote {
        margin-top: 6px;
        font-size: .75em;
        color: var(--muted);
        background: rgba(44,90,160,.06);
        padding: 3px 9px;
        border-radius: 6px;
        display: inline-block;
      }

      /* Sem plantão no dia */
      .kv-empty .v { opacity: .5; font-style: italic; }

      /* Cards da totalização */
      .totalCard {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 11px 14px;
        margin: 8px 0;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 10px;
        box-shadow: 0 1px 8px rgba(0,0,0,.05);
      }
      .totalCard .tNome {
        font-size: .9em;
        font-weight: 700;
        color: var(--text);
        flex: 1;
      }
      .totalCard .tBadge {
        min-width: 28px;
        height: 28px;
        background: linear-gradient(135deg,var(--brand1),var(--brand2));
        color: #fff;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: .9em;
        flex-shrink: 0;
      }
      .totalCard .tDatas {
        font-size: .75em;
        color: var(--muted);
        margin-top: 3px;
      }

      /* Ajustes gerais */
      .results-card { padding: 14px 10px; }
    }

</style>
</head>
<body>
    <header class="app-header">
        <a href="index.html" class="btn-done-ios">OK</a>
        <h1 class="app-header__title">Vigilância Sanitária</h1>
        <h2 class="app-header__subtitle">Escala de Plantão</h2>
    </header>

    <div class="container">

        <!-- Card de Filtros -->
        <div class="card">
            <h3>🔍 Filtros de Busca</h3>

            <div class="filter-row">
                <div class="filter-group">
                    <label for="mesRef">Mês/Ano:</label>
                    <input id="mesRef" type="month" />
                </div>

                <div class="filter-group">
                    <label for="fiscalRef">Fiscal:</label>
                    <select id="fiscalRef">
                        <option value="">Todos os fiscais</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="dataRef">Data:</label>
                    <input id="dataRef" type="date" />
                </div>

                <div class="filter-group" style="align-self: end;">
                    <button class="btn-search" id="btnBuscar">🔎 Buscar</button>
                </div>
            </div>

            <div class="note-box">
                ✨ Selecione um mês e clique em <b>Buscar</b> para exibir a escala e a totalização do mês.
            </div>
        </div>

        <!-- Card Tabela -->
        <div class="card" id="cardTabela" style="display:none;">
            <h3>📅 Escala do mês: <span id="mesTitulo"></span></h3>

            <div class="table-container desktopOnly">
                <table id="tabelaPlantao" class="display nowrap" style="width:100%">
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Dia</th>
                            <th>Matutino (30h)</th>
                            <th>Vespertino (30h)</th>
                            <th>Dia Todo (40h)</th>
                            <th>Obs.</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div id="mobilePlantao" class="mobileList mobileOnly" aria-label="Lista mobile de plantões"></div>
        </div>

        <!-- Card Totalização -->
        <div class="card" id="cardTotal" style="display:none;">
            <h3 id="totalTitulo">📊 Totalização de plantões por fiscal</h3>
            <div class="table-container desktopOnly">
                <table id="tabelaTotal" class="display nowrap" style="width:100%">
                    <thead>
                        <tr>
                            <th>Fiscal</th>
                            <th>Total</th>
                            <th>Datas</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div id="mobileTotal" class="mobileList mobileOnly" aria-label="Lista mobile de totalização"></div>
  <!--
            <div class="note-box" style="margin-top: 14px;">
                📌 Regra anual: os fiscais que fizerem <b>mais de 1 plantão</b> no mês devem ser <b>revezados</b> no mês subsequente,
                evitando que sejam sempre os mesmos ao longo do ano.
            </div>
            -->
        </div>

        <!-- Card Regras 
        <div class="card">
            <h3>📜 Regras (base executável)</h3>

            <details>
                <summary style="cursor:pointer; font-weight:700;">Ver regras</summary>
                <div style="margin-top:12px;">
                    <ol style="line-height:1.6;">
                        <li><b>Regra primordial (capacidade):</b> cada dia útil tem <b>2 posições oficiais</b> de plantão. Composições permitidas:
                            <b>(2×40h)</b>; <b>(2×30h + 1×40h)</b> (fecha cobertura do dia); <b>(2×40h + 1×30h “sobra”)</b> (para absorver excedente do <i>vespertino</i>).</li>
                        <li><b>Escopo:</b> plantão somente de <b>segunda a sexta</b>; fins de semana apenas referenciais. Excluir <b>feriados</b> e <b>pontos facultativos</b>.</li>
                        <li><b>30h (regra mais forte):</b> fiscal 30h faz <b>no máximo 1 plantão/mês</b> e <b>somente meio período</b> (matutino ou vespertino). <b>Nunca</b> atribuir “integral” para 30h.</li>

/* =========================
   Utilitários de data
========================= */

function isoToBR(iso) {
  const [y,m,d] = iso.split("-");
  return `${d}/${m}/${y}`;
}

function dowPT(dateObj){
  const d = dateObj.getDay();
  // 0 dom, 1 seg...
  return ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][d];
}

function mesTituloPT(mesKey){
  if(!mesKey || mesKey.length !== 7) return mesKey || "";
  const y = Number(mesKey.slice(0,4));
  const m = Number(mesKey.slice(5,7));
  const nomes = ["","Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  return `${nomes[m]}/${y}`;
}

function safeName(shortOrFull){
  return shortToFull[shortOrFull] || shortOrFull || "";
}

function localeSortPT(a,b){
  return a.localeCompare(b, "pt-BR", { sensitivity:"base" });
}

/* =========================
   Feriados nacionais + Paixão de Cristo
========================= */
function feriadosNacionaisFixos(ano){
  return [
    `${ano}-01-01`,
    `${ano}-04-21`,
    `${ano}-05-01`,
    `${ano}-09-07`,
    `${ano}-10-12`,
    `${ano}-11-02`,
    `${ano}-11-15`,
    `${ano}-12-25`
  ];
}

// Cálculo da Páscoa (Meeus/Jones/Butcher)
function easterDate(ano){
  const a = ano % 19;
  const b = Math.floor(ano / 100);
  const c = ano % 100;
  const d = Math.floor(b / 4);
  const e = b % 4;
  const f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4);
  const k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(ano, month - 1, day);
}

function dateToISO(d){
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  return `${yyyy}-${mm}-${dd}`;
}

function paixaoDeCristoISO(ano){
  const pascoa = easterDate(ano);
  const sexta = new Date(pascoa);
  sexta.setDate(pascoa.getDate() - 2);
  return dateToISO(sexta);
}

function isDiaSemPlantao(iso, noteText){
  const ano = Number(iso.slice(0,4));
  const set = new Set([
    ...feriadosNacionaisFixos(ano),
    paixaoDeCristoISO(ano),
    ...feriadosMunicipais,
    ...pontosFacultativosPadrao,
    ...pontosFacultativosExtras
  ]);

  if(set.has(iso)) return true;

  const note = (noteText || "").toLowerCase();
  if(note.includes("ponto facultativo")) return true;
  if(note.includes("feriado")) return true;

  // fim de semana sempre sem plantão (exibir linha como sábado/domingo)
  const dt = new Date(iso + "T00:00:00");
  const dow = dt.getDay();
  if(dow === 0 || dow === 6) return true;

  return false;
}

========================= */
function buildMonthRows(mesKey){

  const y = Number(mesKey.slice(0,4));
  const m = Number(mesKey.slice(5,7));

    const dow = (mapByDate.get(iso)?.dow) || dowPT(dt);

    // normaliza
    const mat = entry.mat30 ? `${safeName(entry.mat30)} (Mat)` : "";
    const vesp = entry.vesp30 ? `${safeName(entry.vesp30)} (Vesp)` : "";
    const f40 = (entry.f40 || []).map(safeName);

    const noPlantao = isDiaSemPlantao(iso, entry.note);

    rows.push({
      iso,
      dataBR: isoToBR(iso),
      dow,
      mat30: noPlantao ? "" : mat,
      vesp30: noPlantao ? "" : vesp,
      f40: noPlantao ? [] : f40,
      note: entry.note || (noPlantao ? "" : ""),
      noPlantao
    });
  }

  return rows;
}

/* =========================
   DataTables
========================= */
let dtPlantao = null;
let dtTotal = null;

function fillFiscalSelect(){
  const sel = document.getElementById("fiscalRef");
  fiscaisOrdem.slice().sort(localeSortPT).forEach(n => {
    const opt = document.createElement("option");
    opt.value = n;

/* ─── Mobile cards: escala ─── */
function renderMobileCards(rows) {
  const container = document.getElementById("mobilePlantao");
  if (!container) return;
  container.innerHTML = "";

  rows.forEach(r => {
    const card = document.createElement("div");
    const weekend = r.noPlantao;
    card.className = "dayCard" + (weekend ? " isWeekend" : "");

    let bodyHtml = "";
    if (!weekend) {
      if (r.mat30) {
        bodyHtml += `<div class="kv kv-mat">
          <span class="k">☀ Matutino</span>
          <span class="v">${r.mat30}</span>
        </div>`;
      }
      if (r.vesp30) {
        bodyHtml += `<div class="kv kv-vesp">
          <span class="k">🌙 Vespertino</span>
          <span class="v">${r.vesp30}</span>
        </div>`;
      }
      if (r.f40 && r.f40.length) {
        bodyHtml += `<div class="kv kv-f40">
          <span class="k">⏱ Dia Todo</span>
          <span class="v">${r.f40.join("<br>")}</span>
        </div>`;
      }
      if (!r.mat30 && !r.vesp30 && (!r.f40 || !r.f40.length)) {
        bodyHtml += `<div class="kv kv-empty"><span class="v">— sem plantão —</span></div>`;
      }
      if (r.note) {
        bodyHtml += `<span class="dayNote">${r.note}</span>`;
      }
    }

    card.innerHTML = `
      <div class="dayHead">
        <span class="dayDate">${r.dataBR}</span>
        <span class="dayDow">${r.dow}</span>
      </div>
      <div class="dayBody">${bodyHtml}</div>
    `;
    container.appendChild(card);
  });
}

/* ─── Mobile cards: totalização ─── */
function renderMobileTotal(rows, mesKey) {
  const container = document.getElementById("mobileTotal");
  if (!container) return;
  container.innerHTML = "";

  // Reutiliza a lógica de totalização (cópia simplificada)
  function _norm(s){ return (s||"").toString().normalize("NFD").replace(/[\u0300-\u036f]/g,"").toUpperCase().replace(/\s+/g," ").trim(); }
  function _base(s){ return (s||"").toString().replace(/\s*\([^)]*\)\s*/g," ").replace(/\s+/g," ").trim(); }
  function _resolve(nome){
    const b = _norm(_base(nome)); if(!b) return "";
    for(const f of fiscaisOrdem){ if(_norm(f)===b) return f; }
    for(const f of fiscaisOrdem){ const n=_norm(f); if(n.includes(b)||b.includes(n)) return f; }
    return _base(nome);
  }

  const totals = new Map();
  fiscaisOrdem.forEach(f => totals.set(f, {count:0, dates:[]}));
  rows.forEach(r => {
    if(r.noPlantao) return;
    const add = n => { if(!n) return; const k=_resolve(n); if(!k) return; if(!totals.has(k)) totals.set(k,{count:0,dates:[]}); const o=totals.get(k); o.count++; o.dates.push(r.dataBR); };
    add(r.mat30); add(r.vesp30); (r.f40||[]).forEach(add);
  });

  Array.from(totals.entries())
    .map(([name, o]) => ({name, count:o.count, dates:o.dates}))
    .sort((a,b) => a.name.localeCompare(b.name,"pt-BR",{sensitivity:"base"}))
    .forEach(it => {
      const card = document.createElement("div");
      card.className = "totalCard";
      card.innerHTML = `
        <div>
          <div class="tNome">${it.name}</div>
          ${it.dates.length ? `<div class="tDatas">${it.dates.join(", ")}</div>` : ""}
        </div>
        <div class="tBadge">${it.count}</div>
      `;
      container.appendChild(card);
    });
}

function renderPlantao(rows){
  // IMPORTANTE: destruir DataTable ANTES de manipular o DOM
  if(dtPlantao) {
    try { dtPlantao.destroy(); } catch(e){}
    dtPlantao = null;
  }

  const tbody = document.querySelector("#tabelaPlantao tbody");
  tbody.innerHTML = "";

  rows.forEach(r => {
    const tr = document.createElement("tr");
    if(r.noPlantao) tr.classList.add("row-no-plantao");

    const f40txt = r.f40.length ? r.f40.join(", ") : "—";

    tr.innerHTML = `
      <td>${r.dataBR}</td>
      <td>${r.dow}</td>
      <td>${r.mat30 || "—"}</td>
      <td>${r.vesp30 || "—"}</td>
      <td>${f40txt}</td>
      <td>${r.note || (r.noPlantao ? "—" : "")}</td>
    `;
    tbody.appendChild(tr);
  });

  dtPlantao = $("#tabelaPlantao").DataTable({
    pageLength: 50,
    lengthMenu: [25, 50, 100, -1],
    order: [[0, "asc"]],
    language: {
      url: "https://cdn.datatables.net/plug-ins/1.13.7/i18n/pt-BR.json"
    },
    scrollX: true
  });

  // Renderiza versão mobile
  renderMobileCards(rows);
}

function renderTotal(rows, mesKey){
  // IMPORTANTE: destruir DataTable ANTES de manipular o DOM
  if(dtTotal) {
    try { dtTotal.destroy(); } catch(e){}
    dtTotal = null;
  }

  // totaliza somente dias com plantão
  
  // =========================================================
  // Normalização e casamento de nomes (para totalização)
  // - Permite que a escala use nomes curtos ("José Luiz") e
  //   a totalização some no nome completo da lista oficial.
  // =========================================================
  function _normNome(s){
    return (s||"")
      .toString()
      .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      .toUpperCase()
      .replace(/\s+/g," ")
      .trim();
  }

  function _baseNome(s){
    // remove qualquer observação entre parênteses: (Mat), (Vesp), (sobra), etc.
    return (s||"").toString().replace(/\s*\([^)]*\)\s*/g, " ").replace(/\s+/g," ").trim();
  }

  function _resolveFiscalKey(nome){
    const base = _baseNome(nome);
    const nb = _normNome(base);
    if(!nb) return "";
    // 1) igualdade normalizada
    for(const f of fiscaisOrdem){
      if(_normNome(f) === nb) return f;
    }
    // 2) contém (para casar "Tathiane" com "TATHIANE PESSOA DE SOUZA")
    for(const f of fiscaisOrdem){
      const nf = _normNome(f);
      if(nf.includes(nb) || nb.includes(nf)) return f;
    }
    // 3) fallback: usa o base mesmo
    return base;
  }

const totals = new Map();
  fiscaisOrdem.forEach(f => totals.set(f, {count:0, dates:[]}));

  rows.forEach(r => {
    if(r.noPlantao) return;

    const dateBR = r.dataBR;

    const add = (name) => {
      if(!name) return;
      const key = _resolveFiscalKey(name);
      if(!key) return;
      if(!totals.has(key)) totals.set(key, {count:0, dates:[]});

      const obj = totals.get(key);
      obj.count += 1;
      obj.dates.push(dateBR);
    };

    add(r.mat30);
    add(r.vesp30);
    (r.f40 || []).forEach(add);
  });

  // título contextual
  document.getElementById("totalTitulo").textContent =
    `📊 Totalização de plantões por fiscal — ${mesTituloPT(mesKey)}`;

  const body = document.querySelector("#tabelaTotal tbody");
  body.innerHTML = "";

  const ordered = Array.from(totals.entries())
    .map(([name, obj]) => ({name, count: obj.count, dates: obj.dates}))
    .sort((a,b)=> localeSortPT(a.name,b.name));

  ordered.forEach(it => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${it.name}</td>
      <td style="text-align:center; font-weight:700;">${it.count}</td>
      <td>${it.dates.join(", ")}</td>
    `;
    body.appendChild(tr);
  });

  dtTotal = $("#tabelaTotal").DataTable({
    pageLength: 50,
    lengthMenu: [25, 50, 100, -1],
    order: [[0, "asc"]],
    language: {
      url: "https://cdn.datatables.net/plug-ins/1.13.7/i18n/pt-BR.json"
    },
    scrollX: true
  });

  // Renderiza versão mobile da totalização
  renderMobileTotal(rows, mesKey);
}

function applyFilters(rows){
  const fiscal = document.getElementById("fiscalRef").value;
  const data = document.getElementById("dataRef").value;

  return rows.filter(r => {
    if(data && r.iso !== data) return false;
    if(fiscal){
      const list = [];
      if(r.mat30) list.push(r.mat30.replace(/\s*\(Mat\)|\s*\(Vesp\)/g,"").trim());
      if(r.vesp30) list.push(r.vesp30.replace(/\s*\(Mat\)|\s*\(Vesp\)/g,"").trim());
      (r.f40||[]).forEach(n => list.push(n));
      if(!list.includes(fiscal)) return false;
    }
    return true;
  });
}

/* =========================
   Ação Buscar
========================= */
function doBuscar(){
  const mesKey = document.getElementById("mesRef").value;
  if(!mesKey){
    alert("Selecione o mês/ano.");
    return;
  }

  const allRows = buildMonthRows(mesKey);

  // Atualiza título do mês
  document.getElementById("mesTitulo").textContent = mesTituloPT(mesKey);

  // aplica filtros de fiscal/data em cima do mês gerado
  const filteredRows = applyFilters(allRows);

  // exibe cards
  document.getElementById("cardTabela").style.display = "block";
  document.getElementById("cardTotal").style.display = "block";

  renderPlantao(filteredRows);
  renderTotal(allRows, mesKey); // totalização sempre do mês inteiro selecionado
}



function init(){
  // Preenche select de fiscais (ordem alfabética pt-BR)
  const sel = document.getElementById("fiscalRef");
  if(sel && sel.options && sel.options.length <= 1){
    const ordered = (fiscaisOrdem || []).slice().sort((a,b)=>a.localeCompare(b,"pt-BR",{sensitivity:"base"}));
    for(const name of ordered){
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      sel.appendChild(opt);
    }
  }

  // Mês padrão: mês corrente
  const mesRef = document.getElementById("mesRef");
  if(mesRef && !mesRef.value){
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,"0");
    mesRef.value = `${y}-${m}`;
  }

  // Totalização começa oculta até buscar
  const cardTabela = document.getElementById("cardTabela");
  const cardTotal  = document.getElementById("cardTotal");
  if(cardTabela) cardTabela.style.display = "none";
  if(cardTotal)  cardTotal.style.display  = "none";

  // Eventos
  const btn = document.getElementById("btnBuscar");
  if(btn){
    btn.addEventListener("click", (e)=>{ e.preventDefault(); doBuscar(); });
  }

  // Enter no formulário (se houver)
  document.addEventListener("keydown", (e)=>{
    if(e.key === "Enter"){
      const active = document.activeElement;
      if(active && (active.id === "mesRef" || active.id === "fiscalRef" || active.id === "dataRef")){
        e.preventDefault();
        doBuscar();
      }
    }
  });
}


// =============================
// Boot
// =============================
document.addEventListener('DOMContentLoaded', () => {
  init();
});

</script>
