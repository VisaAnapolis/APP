    <!-- Toast de aviso de descontinuação do domínio garrado -->
    <style>
      /* ── TOAST DEPRECIAÇÃO: Particle Dissolve lento ── */
      #visa-toast-deprecacao {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 99998;
        background: linear-gradient(135deg, #1a3a6b, #2c5aa0);
        color: #fff;
        border-radius: 14px;
        padding: 14px 22px;
        max-width: min(420px, 92vw);
        font-size: 0.9rem;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
        font-weight: 600;
        line-height: 1.45;
        box-shadow: 0 8px 32px rgba(0,0,0,0.28), 0 0 0 1px rgba(255,255,255,0.10);
        text-align: center;
        display: none;
        /* Entrada suave */
        animation: visaToastDeprecEntrada 0.45s cubic-bezier(.22,1,.36,1) both;
        will-change: opacity, filter, transform;
      }

      @keyframes visaToastDeprecEntrada {
        from { opacity: 0; transform: translateX(-50%) translateY(18px) scale(0.96); }
        to   { opacity: 1; transform: translateX(-50%) translateY(0)     scale(1);    }
      }

      /* ── Particle Dissolve: desintegração lenta em 3 fases ── */
      @keyframes visaParticleDissolve {
        0%   {
          opacity: 1;
          filter: blur(0px) brightness(1);
          transform: translateX(-50%) translateY(0) scale(1);
          clip-path: inset(0% 0% 0% 0% round 14px);
        }
        18%  {
          opacity: 0.92;
          filter: blur(0.5px) brightness(1.15);
          transform: translateX(-50%) translateY(-2px) scale(1.012);
          clip-path: inset(0% 0% 0% 0% round 14px);
        }
        40%  {
          opacity: 0.72;
          filter: blur(2px) brightness(1.25);
          transform: translateX(-50%) translateY(-6px) scale(1.02);
          clip-path: inset(4% 2% 2% 3% round 16px);
        }
        60%  {
          opacity: 0.42;
          filter: blur(5px) brightness(1.4) saturate(0.6);
          transform: translateX(-50%) translateY(-12px) scale(1.04);
          clip-path: inset(10% 6% 8% 5% round 20px);
        }
        80%  {
          opacity: 0.15;
          filter: blur(10px) brightness(1.6) saturate(0.2);
          transform: translateX(-50%) translateY(-20px) scale(1.06);
          clip-path: inset(20% 14% 18% 10% round 28px);
        }
        100% {
          opacity: 0;
          filter: blur(18px) brightness(2) saturate(0);
          transform: translateX(-50%) translateY(-32px) scale(1.10);
          clip-path: inset(35% 25% 35% 25% round 40px);
        }
      }

      #visa-toast-deprecacao.saindo {
        animation: visaParticleDissolve 1.8s cubic-bezier(.4,0,.8,1) forwards;
        pointer-events: none;
      }
    </style>

    <div id="visa-toast-deprecacao" style="display:none;" role="status" aria-live="polite"></div>

    <script>
      (function () {
        const _h = window.location.hostname;
        if (!_h.includes('garrado')) return;

        const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
        const msg = isPWA
          ? '📢 Este APP será descontinuado em breve. Favor reinstalar pelo endereço oficial: visaanapolis.github.io/APP'
          : '📢 Este endereço será descontinuado em breve. Favor acessar o endereço oficial: visaanapolis.github.io/APP';

        const toast = document.getElementById('visa-toast-deprecacao');
        toast.textContent = msg;
        toast.style.display = 'block';

        /* Visível por 8 s → depois aplica Particle Dissolve de 1,8 s */
        setTimeout(function () {
          toast.classList.add('saindo');
          toast.addEventListener('animationend', function () {
            toast.style.display = 'none';
          }, { once: true });
        }, 8000);
      })();
    </script>
