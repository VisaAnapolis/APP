<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Alvarás Emitidos - CVS Vigilância Sanitária</title>

  <style>
    :root {
      --bg-primary: #f5f5f5;
      --card-bg: #ffffff;
      --card-border: #e6e6e6;
      --text-primary: #111111;
      --text-secondary: #666666;
      --surface-variant: #f7f8fa;
      --brand1: #1a3a6b;
      --brand2: #2c5aa0;
      --warning-bg: #fff3cd;
      --warning-text: #856404;
      --success-bg: #d4edda;
      --success-text: #155724;
      --danger-bg: #f8d7da;
      --danger-text: #721c24;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #000000;
        --card-bg: #1c1c1e;
        --card-border: #38383a;
        --text-primary: #ffffff;
        --text-secondary: #a0a0a0;
        --surface-variant: #2c2c2e;
        --brand1: #0a84ff;
        --brand2: #64d2ff;
        --warning-bg: #4a3800;
        --warning-text: #ffb700;
        --success-bg: #1e3a1e;
        --success-text: #4cd964;
        --danger-bg: #3a1e1e;
        --danger-text: #ff453a;
      }

      .filter-group label { color: var(--text-primary) !important; }
      .filter-group input, .filter-group select {
        background: var(--surface-variant) !important;
        color: var(--text-primary) !important;
        border-color: var(--card-border) !important;
      }

      .btn-secondary { background: #48484a !important; color: #ffffff !important; }
      .btn-secondary:hover { background: #636366 !important; }
      .stat-card p { color: var(--text-secondary) !important; }
      .info-item strong { color: var(--text-primary) !important; }
      .info-item span { color: var(--text-secondary) !important; }
      td { border-bottom: 1px solid var(--card-border) !important; }
      .no-results { color: var(--text-secondary) !important; }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .container { max-width: 1400px; margin: 22px auto 30px; padding: 0 16px; }

    .card {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border: 1px solid var(--card-border);
    }

    .card h3 { color: var(--brand1); margin-bottom: 20px; font-size: 1.3em; }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .filter-group { display: flex; flex-direction: column; }
    .filter-group label { font-weight: 600; color: var(--text-primary); margin-bottom: 8px; font-size: 0.9em; }

    .filter-group input, .filter-group select {
      padding: 10px 12px;
      border: 1px solid #ccd6e0;
      border-radius: 6px;
      font-size: 0.95em;
      transition: all 0.2s;
    }

    .filter-group input:focus, .filter-group select:focus {
      outline: none;
      border-color: var(--brand1);
      box-shadow: 0 0 0 3px rgba(26, 58, 107, 0.1);
    }

    .btn-container { display: flex; gap: 12px; margin-top: 20px; }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--brand1); color: white; }
    .btn-primary:hover { background: #2c5aa0; }
    .btn-secondary { background: #6c757d; color: white; }
    .btn-secondary:hover { background: #5a6268; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .stat-card h3 { font-size: 2.2em; color: var(--brand1); margin-bottom: 8px; }
    .stat-card p { color: var(--text-secondary); font-size: 0.9em; font-weight: 600; }

    .cache-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: rgba(26, 58, 107, 0.05);
      border-radius: 8px;
      font-size: 0.9em;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .cache-info span { color: var(--brand1); font-weight: 600; }

    .pagination-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .pagination-controls select {
      padding: 8px 12px;
      border: 1px solid #ccd6e0;
      border-radius: 6px;
      font-size: 0.9em;
    }

    .pagination-buttons { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .btn-page {
      padding: 8px 16px;
      border: 1px solid #1a3a6b;
      background: var(--card-bg);
      color: var(--brand1);
      border-radius: 6px;
      font-size: 0.9em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-page:hover:not(:disabled) { background: var(--brand1); color: white; }
    .btn-page:disabled { opacity: 0.4; cursor: not-allowed; border-color: #ccc; color: #999; }

    .table-container { position: relative; width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .table-wrapper { width: 100%; overflow-x: auto; overflow-y: visible; -webkit-overflow-scrolling: touch; }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--card-bg);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);

      /* FIX 3: evita header “andar” conforme ordenação */
      table-layout: fixed;
    }

    thead { background: var(--brand1); color: white; }

    th {
      padding: 14px 12px;
      text-align: left;
      font-weight: 600;
      font-size: 0.9em;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;

      overflow: hidden;
      text-overflow: ellipsis;
    }

    td {
      padding: 14px 12px;
      border-bottom: 1px solid #eee;
      font-size: 0.9em;

      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tbody tr { cursor: pointer; transition: all 0.2s; }
    tbody tr:hover { background: var(--surface-variant); }

    .badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.85em;
      font-weight: 600;
      display: inline-block;
      white-space: nowrap;
    }

    .badge-success { background: var(--success-bg); color: var(--success-text); }
    .badge-warning { background: var(--warning-bg); color: #856404; border: 1px solid #ffc107; }
    .badge-danger { background: var(--danger-bg); color: var(--danger-text); }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0; top: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      overflow-
