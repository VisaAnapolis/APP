<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <!-- ── Cache-Control: sempre busca versão mais recente do servidor ── -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTS - Mandado de Tarefas Sanitárias</title>
  
  <link rel="stylesheet" href="./css/design-tokens.css">
  <link rel="stylesheet" href="./css/header-component.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/layouts.css">
  
  <style>
    /* Header agora usa header-component.css */

    body {
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .topbar {
      position: sticky;
      top: 0;
      background: var(--card-bg);
      border-bottom: 1px solid #ddd;
      padding: 16px 20px;
      margin: -20px -20px 20px -20px;
      z-index: 100;
    }
    
    .topbar h1 {
      margin: 0;
      font-size: 20px;
    }
    
    .topbar a {
      text-decoration: none;
      color: #007AFF;
    }
    
    @media (min-width: 769px) {
      .topbar {
        display: none;
      }
    }
    
    .pdf-container {
      width: 100%;
      height: 80vh;
      border: 1px solid #ddd;
      margin: 20px 0;
    }
    
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="./index.html">← Voltar</a>
    <h1>MTS - Mandado de Tarefas Sanitárias</h1>
  </div>

  <h1>Mandado de Tarefas Sanitárias (MTS)</h1>
  <p>Documento oficial para fiscalização sanitária.</p>

  <div class="pdf-container">
    <iframe 
      src="mts/MTS_GERAL_TODOS_FISCAIS.pdf"
      title="MTS PDF">
    </iframe>
  </div>

  <p>
    <button onclick="window.open('mts/MTS_GERAL_TODOS_FISCAIS.pdf','_blank')" 
            style="padding: 10px 20px; background: #007AFF; color: white; border: none; border-radius: 8px; cursor: pointer;">
      📄 Abrir PDF em Nova Guia
    </button>
  </p>

  <script src="./js/platform-detector.js"></script>
  <script>
    // No APP (PWA) ou mobile, redireciona para o visualizador com botão "Voltar"
    (function () {
      var isMobileOrPWA =
        /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ||
        window.matchMedia('(display-mode: standalone)').matches ||
        !!window.navigator.standalone;
      if (isMobileOrPWA) {
        var title = encodeURIComponent('MTS – Mandado de Tarefas Sanitárias');
        var src   = encodeURIComponent('mts/MTS_GERAL_TODOS_FISCAIS.pdf');
        location.replace('pdf_viewer.html?src=' + src + '&title=' + title);
      }
    })();
  </script>
</body>
</html>
