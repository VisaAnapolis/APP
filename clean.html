<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Limpeza Dispositivos + Tokens FCM</title>
  <style>
    body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 24px; }
    h2   { color: #60a5fa; }
    pre  { background: #1e293b; padding: 16px; border-radius: 8px; overflow-x: auto;
           font-size: .82rem; line-height: 1.6; white-space: pre-wrap; }
    .ok  { color: #4ade80; } .warn { color: #fbbf24; } .err { color: #f87171; }
    button { background: #2563eb; color: #fff; border: none; padding: 10px 24px;
             border-radius: 8px; font-size: 1rem; cursor: pointer; margin: 8px 4px; }
    button.danger { background: #dc2626; }
  </style>
</head>
<body>
<h2>🧹 Limpeza Dispositivos + Tokens FCM — VISA</h2>
<p>Agrupa dispositivos por <strong>SO + Navegador + Fabricante + Modelo</strong>,
   mantém o mais recente e descarta os tokens excedentes.</p>
<button onclick="executar(false)">🔍 Simular (dry-run)</button>
<button class="danger" onclick="executar(true)">⚠️ Executar de verdade</button>
<pre id="log">Aguardando login...</pre>

<script type="module">
import { initializeApp }      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, getDocs, doc, updateDoc }
                              from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyDo473puJesZ9rr3IBoX5AWczCIMuKBTrg",
  authDomain: "visam-3a30b.firebaseapp.com",
  projectId: "visam-3a30b",
  messagingSenderId: "308899251430",
  appId: "1:308899251430:web:0053cdbd0bed7f0de76727"
});
const auth = getAuth(app);
const db   = getFirestore(app);
const log  = document.getElementById('log');

const print = (msg, cls='') =>
  log.innerHTML += `<span class="${cls}">${msg}</span>\n`;

const norm = s => (s || 'desconhecido').toLowerCase().replace(/[^a-z0-9]/g, '');

const novaChave = d =>
  norm(d.sistemaOperacional) + norm(d.navegador) +
  norm(d.fabricante) + norm(d.modelo);

const toMs = x => {
  if (!x) return 0;
  if (x.seconds) return x.seconds * 1000;
  const t = new Date(x).getTime();
  return isFinite(t) ? t : 0;
};

window.executar = async function(commit) {
  log.innerHTML = '';
  print(commit
    ? '⚠️  MODO REAL — gravando no Firestore'
    : '🔍 MODO SIMULAÇÃO — nenhuma alteração', commit ? 'warn' : 'ok');
  print('');

  const snap = await getDocs(collection(db, 'usuarios'));
  let totUsuarios = 0, totDispRemovidos = 0, totTokenAntes = 0, totTokenDepois = 0;

  for (const docSnap of snap.docs) {
    const data   = docSnap.data();
    const email  = docSnap.id;
    const disps  = data.dispositivos;
    const tokens = Array.isArray(data.fcmTokens) ? [...data.fcmTokens] : [];

    if (!disps || typeof disps !== 'object') continue;
    const chaves = Object.keys(disps);

    // Nada a fazer se já está limpo
    if (chaves.length <= 1 && tokens.length <= 1) continue;

    // ── 1. Agrupa dispositivos por nova chave (sem resolução) ──────────
    const grupos = {};
    for (const k of chaves) {
      const nk = novaChave(disps[k]);
      if (!grupos[nk]) grupos[nk] = [];
      grupos[nk].push(k);
    }

    const chavesRemover = [];
    const chavesManter  = [];

    for (const lista of Object.values(grupos)) {
      if (lista.length === 1) {
        chavesManter.push(lista[0]);
        continue;
      }
      lista.sort((a, b) => toMs(disps[b].ultimoAcesso) - toMs(disps[a].ultimoAcesso));
      chavesManter.push(lista[0]);
      chavesRemover.push(...lista.slice(1));
    }

    // ── 2. Tokens: mantém 1 por dispositivo ativo (deduplica + trunca) ─
    // Os tokens NÃO ficam dentro de cada objeto de dispositivo,
    // por isso usamos quantidade de dispositivos mantidos como limite.
    const tokensDedupe = [...new Set(tokens)];
    const novosFcm = tokensDedupe.slice(0, Math.max(chavesManter.length, 1));

    const houveAlteracao = chavesRemover.length > 0 || novosFcm.length < tokens.length;
    if (!houveAlteracao) continue;

    totUsuarios++;
    totDispRemovidos += chavesRemover.length;
    totTokenAntes    += tokens.length;
    totTokenDepois   += novosFcm.length;

    // ── Log ────────────────────────────────────────────────────────────
    print(`\n  👤 ${email} (${data.nome || ''})`, 'warn');
    print(`     Dispositivos: ${chaves.length} → ${chavesManter.length} (remove ${chavesRemover.length})`);
    chavesRemover.forEach(k => {
      const d = disps[k];
      print(`       ❌ "${k}"  v${d.appVersionLast||'?'}  última: ${toMs(d.ultimoAcesso) ? new Date(toMs(d.ultimoAcesso)).toLocaleString('pt-BR') : '-'}`, 'err');
    });
    if (tokens.length !== novosFcm.length)
      print(`     Tokens FCM: ${tokens.length} → ${novosFcm.length}`, 'warn');

    if (commit) {
      const dispLimpo = {};
      for (const k of chavesManter) dispLimpo[k] = disps[k];

      await updateDoc(doc(db, 'usuarios', email), {
        dispositivos: dispLimpo,
        fcmTokens: novosFcm
      });
      print(`     ✅ Salvo`, 'ok');
    }
  }

  print('\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  print(`Usuários afetados:      ${totUsuarios}`,      totUsuarios      > 0 ? 'warn' : 'ok');
  print(`Dispositivos removidos: ${totDispRemovidos}`, totDispRemovidos > 0 ? 'err'  : 'ok');
  print(`Tokens FCM: ${totTokenAntes} → ${totTokenDepois} (−${totTokenAntes - totTokenDepois})`,
    totTokenAntes > totTokenDepois ? 'warn' : 'ok');

  if (!commit && totDispRemovidos > 0)
    print('\n▶ Revise e clique "Executar de verdade" para aplicar.', 'warn');
  else if (commit && totUsuarios > 0)
    print('\n✅ Limpeza concluída!', 'ok');
  else if (totUsuarios === 0)
    print('\n✅ Nenhum usuário precisa de limpeza.', 'ok');
};

onAuthStateChanged(auth, u => {
  log.innerHTML = u
    ? `<span class="ok">Logado: ${u.email}</span>\n`
    : `<span class="err">Faça login no app primeiro.</span>`;
});
</script>
</body>
</html>
