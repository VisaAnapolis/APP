<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Migração + Limpeza Dispositivos — VISA</title>
  <style>
    body { font-family: monospace; background: #0f172a; color: #e2e8f0; padding: 24px; }
    h2   { color: #60a5fa; }
    pre  { background: #1e293b; padding: 16px; border-radius: 8px; overflow-x: auto;
           font-size: .82rem; line-height: 1.6; white-space: pre-wrap; }
    .ok  { color: #4ade80; } .warn { color: #fbbf24; } .err { color: #f87171; }
    button { background: #2563eb; color: #fff; border: none; padding: 10px 24px;
             border-radius: 8px; font-size: 1rem; cursor: pointer; margin: 8px 4px; }
    button.danger { background: #dc2626; }
  </style>
</head>
<body>
<h2>🔧 Migração + Limpeza Dispositivos — VISA</h2>
<p>Renomeia chaves antigas (com resolução) para o novo formato <strong>SO + Navegador + Fabricante + Modelo</strong>,
   remove duplicatas e ajusta tokens FCM.</p>
<button onclick="executar(false)">🔍 Simular (dry-run)</button>
<button class="danger" onclick="executar(true)">⚠️ Executar de verdade</button>
<pre id="log">Aguardando login...</pre>

<script type="module">
import { initializeApp }      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, getDocs, doc, updateDoc }
                              from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyDo473puJesZ9rr3IBoX5AWczCIMuKBTrg",
  authDomain: "visam-3a30b.firebaseapp.com",
  projectId: "visam-3a30b",
  messagingSenderId: "308899251430",
  appId: "1:308899251430:web:0053cdbd0bed7f0de76727"
});
const auth = getAuth(app);
const db   = getFirestore(app);
const log  = document.getElementById('log');

const print = (msg, cls='') =>
  log.innerHTML += `<span class="${cls}">${msg}</span>\n`;

// Nova chave: SO + Navegador + Fabricante + Modelo (SEM resolução)
const norm = s => (s || 'desconhecido').toLowerCase().replace(/[^a-z0-9]/g, '');
const novaChave = d =>
  [norm(d.sistemaOperacional), norm(d.navegador),
   norm(d.fabricante),         norm(d.modelo)].join('_');

const toMs = x => {
  if (!x) return 0;
  if (x.seconds) return x.seconds * 1000;
  const t = new Date(x).getTime();
  return isFinite(t) ? t : 0;
};

window.executar = async function(commit) {
  log.innerHTML = '';
  print(commit
    ? '⚠️  MODO REAL — gravando no Firestore'
    : '🔍 MODO SIMULAÇÃO — nenhuma alteração', commit ? 'warn' : 'ok');
  print('');

  const snap = await getDocs(collection(db, 'usuarios'));
  let totUsuarios = 0, totMigrados = 0, totRemovidos = 0,
      totTokenAntes = 0, totTokenDepois = 0;

  for (const docSnap of snap.docs) {
    const data   = docSnap.data();
    const email  = docSnap.id;
    const disps  = data.dispositivos;
    const tokens = Array.isArray(data.fcmTokens) ? [...data.fcmTokens] : [];

    if (!disps || typeof disps !== 'object' || Object.keys(disps).length === 0) continue;

    const chaves = Object.keys(disps);

    // ── 1. Reagrupa por NOVA chave ─────────────────────────────────────
    // Vários dispositivos com chaves antigas diferentes podem ter a mesma nova chave
    const grupos = {}; // novaChave → [{ chaveAntiga, registro }]
    for (const k of chaves) {
      const nk = novaChave(disps[k]);
      if (!grupos[nk]) grupos[nk] = [];
      grupos[nk].push({ chaveAntiga: k, reg: disps[k] });
    }

    // ── 2. Para cada grupo, mantém o mais recente ──────────────────────
    const dispFinal = {}; // será o novo mapa de dispositivos
    let migrou = false;

    for (const [nk, lista] of Object.entries(grupos)) {
      // Ordena mais recente primeiro
      lista.sort((a, b) => toMs(b.reg.ultimoAcesso) - toMs(a.reg.ultimoAcesso));
      const melhor = lista[0];

      // Verifica se a chave antiga já era igual à nova (sem migração necessária)
      const jaNova = melhor.chaveAntiga === nk;

      if (!jaNova) {
        migrou = true;
        totMigrados++;
      }
      if (lista.length > 1) totRemovidos += lista.length - 1;

      // Sempre salva na nova chave com o registro mais recente
      dispFinal[nk] = melhor.reg;
    }

    // ── 3. Tokens: 1 por dispositivo final ────────────────────────────
    const tokensDedupe = [...new Set(tokens)];
    const novosFcm     = tokensDedupe.slice(0, Object.keys(dispFinal).length);

    const houveAlteracao =
      migrou ||
      Object.keys(dispFinal).length !== chaves.length ||
      novosFcm.length !== tokens.length;

    if (!houveAlteracao) continue;

    totUsuarios++;
    totTokenAntes  += tokens.length;
    totTokenDepois += novosFcm.length;

    // ── Log ────────────────────────────────────────────────────────────
    print(`\n  👤 ${email} (${data.nome || ''})`, 'warn');
    print(`     Dispositivos: ${chaves.length} → ${Object.keys(dispFinal).length}`);

    for (const [nk, lista] of Object.entries(grupos)) {
      const melhor = lista[0];
      const jaNova = melhor.chaveAntiga === nk;
      if (!jaNova)
        print(`     🔄 "${melhor.chaveAntiga}" → "${nk}"`, 'ok');
      if (lista.length > 1)
        lista.slice(1).forEach(x =>
          print(`     ❌ "${x.chaveAntiga}" removido (duplicata)`, 'err'));
    }

    if (tokens.length !== novosFcm.length)
      print(`     Tokens FCM: ${tokens.length} → ${novosFcm.length}`, 'warn');

    if (commit) {
      await updateDoc(doc(db, 'usuarios', email), {
        dispositivos: dispFinal,
        fcmTokens: novosFcm
      });
      print(`     ✅ Salvo`, 'ok');
    }
  }

  print('\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
  print(`Usuários afetados:    ${totUsuarios}`,  totUsuarios  > 0 ? 'warn' : 'ok');
  print(`Chaves migradas:      ${totMigrados}`,  totMigrados  > 0 ? 'ok'   : 'ok');
  print(`Duplicatas removidas: ${totRemovidos}`, totRemovidos > 0 ? 'err'  : 'ok');
  print(`Tokens FCM: ${totTokenAntes} → ${totTokenDepois} (−${totTokenAntes - totTokenDepois})`,
    totTokenAntes > totTokenDepois ? 'warn' : 'ok');

  if (!commit && totUsuarios > 0)
    print('\n▶ Revise e clique "Executar de verdade" para aplicar.', 'warn');
  else if (commit && totUsuarios > 0)
    print('\n✅ Migração concluída!', 'ok');
  else
    print('\n✅ Nenhum usuário precisa de migração.', 'ok');
};

onAuthStateChanged(auth, u => {
  log.innerHTML = u
    ? `<span class="ok">Logado: ${u.email}</span>\n`
    : `<span class="err">Faça login no app primeiro.</span>`;
});
</script>
</body>
</html>
