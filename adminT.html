<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Administrativo - VISA Anápolis</title>

<link rel="stylesheet" href="./css/design-tokens.css">

<style>
/* === ESTILOS (mantidos do original, sem mudanças estruturais) === */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
.card{background:#fff;border-radius:16px;padding:18px;margin-bottom:16px;border:1px solid var(--line);box-shadow:var(--shadow2)}
.users-table{width:100%;border-collapse:collapse;font-size:.9rem}
.users-table th,.users-table td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top}
.users-table th{background:var(--brand1);color:#fff;text-align:left}
.badge{padding:4px 10px;border-radius:12px;font-size:.75rem;font-weight:600}
.badge.ativo{background:rgba(52,199,89,.15);color:#34C759}
.badge.inativo{background:rgba(220,53,69,.15);color:#dc3545}
.user-photo{width:32px;height:32px;border-radius:50%;object-fit:cover}
.btn{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:600}
.btn-primary{background:linear-gradient(135deg,#2c5aa0,#3d6bb3);color:#fff}
</style>
</head>

<body>

<div class="card">
<h3>👥 Gerenciamento de Usuários</h3>
<table class="users-table">
<thead>
<tr>
<th>Foto</th>
<th>Nome</th>
<th>E-mail</th>
<th>Grupo</th>
<th>Status</th>
<th>Último acesso</th>
<th>Dispositivo</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="usersTableBody"></tbody>
</table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDo473puJesZ9rr3IBoX5AWczCIMuKBTrg",
  authDomain: "visam-3a30b.firebaseapp.com",
  projectId: "visam-3a30b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function formatarDataHora(ts){
  if(!ts) return "<span style='color:#999'>Nunca</span>";
  const d = ts.seconds ? new Date(ts.seconds*1000) : new Date(ts);
  return d.toLocaleString("pt-BR");
}

function formatarDispositivo(d){
  if(!d) return "<span style='color:#999'>-</span>";

  return `
    <div style="font-size:.85em;line-height:1.4">
      💻 ${d.sistemaOperacional || "?"} ${d.versaoSO || ""}<br>
      🌐 ${d.navegador || "?"} ${d.versaoNavegador || ""}<br>
      📐 ${d.resolucao || "-"}<br>
      🔑 ${d.isPWA ? "<strong>PWA</strong>" : (d.modoAcesso || "Navegador")}
    </div>
  `;
}

async function carregarUsuarios(){
  const q = query(collection(db,"usuarios"),orderBy("nome"));
  const snap = await getDocs(q);
  const tbody = document.getElementById("usersTableBody");
  tbody.innerHTML = "";

  snap.forEach(docSnap=>{
    const u = docSnap.data();
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${u.photoURL ? `<img src="${u.photoURL}" class="user-photo">` : "👤"}</td>
      <td><strong>${u.nome||"N/A"}</strong></td>
      <td>${u.email||docSnap.id}</td>
      <td>${u.grupo||"-"} </td>
      <td><span class="badge ${u.ativo!==false?"ativo":"inativo"}">${u.ativo!==false?"Ativo":"Inativo"}</span></td>
      <td>${formatarDataHora(u.ultimoAcesso)}</td>
      <td>${formatarDispositivo(u.dispositivo)}</td>
      <td><button class="btn btn-primary">Editar</button></td>
    `;

    tbody.appendChild(tr);
  });
}

carregarUsuarios();
</script>

</body>
</html>
